services:
  app:
    container_name: vagas-app
    image: 'vagas-dev:${TAG-latest}'
    restart: always
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    depends_on:
      database:
        condition: service_healthy
  ui:
    container_name: vagas-ui
    image: 'vagas-ui:${TAG-latest}'
    restart: always
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - app
    environment:
      - NEXT_PUBLIC_API_URL=http://vagas-app:8000
    ports:
      - "3000:3000"
  database:
    container_name: vagas-db
    image: postgres:18.3-alpine@sha256:4da1a4828be12604092fa55311276f08f9224a74a62dcb4708bd7439e2a03911
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file:
      - .env
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
  web:
    container_name: vagas-dev-web
    image: nginx:1.29.5-alpine@sha256:1d13701a5f9f3fb01aaa88cef2344d65b6b5bf6b7d9fa4cf0dca557a8d7702ba
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    environment:
      - NGINX_PORT=80
    depends_on:
      - app
      - ui
volumes:
  pgdata:
