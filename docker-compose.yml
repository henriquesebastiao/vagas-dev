services:
  database:
    container_name: vagas-db
    image: postgres:18.2-alpine
    ports:
      - "5432:5432"
    volumes:
      # - ./data/postgres/18/docker:/var/lib/postgresql/18/docker
      - pgdata:/var/lib/postgresql/18/docker
    env_file:
      - .env
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

volumes:
  pgdata: